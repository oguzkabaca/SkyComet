<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="/startup.js"></script>
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/startup.css" />
    <link rel="stylesheet" href="/src/styles/splash.css" />
    <title>Skycomet</title>
  </head>
  <body>
    <div id="startup-screen" role="status" aria-live="polite" aria-label="Skycomet is starting">
      <div class="startup-content">
        <img class="startup-logo" src="/favicon.png" alt="Skycomet" />
        <p id="startup-message">Preparing Skycomet</p>
        <p id="startup-help" hidden></p>
        <div id="startup-actions" hidden>
          <button id="startup-exit" type="button">Exit Skycomet</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/splash.ts"></script>
  </body>
</html>
