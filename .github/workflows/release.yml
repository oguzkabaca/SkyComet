name: Release

# Builds the signed NSIS installer + updater artifacts whenever a version tag
# is pushed, and attaches them to a draft GitHub Release (ADR 0014 D5).
# Requires the TAURI_SIGNING_PRIVATE_KEY repository secret (updater signing).

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Windows installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust (toolchain pinned via rust-toolchain.toml)
        run: rustup show

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: npm ci
        run: npm ci
        working-directory: frontend

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SkyComet ${{ github.ref_name }}'
          releaseBody: 'See [CHANGELOG.md](https://github.com/oguzkabaca/SkyComet/blob/main/CHANGELOG.md) for details.'
          releaseDraft: true
          # Not flagged as a GitHub prerelease: the updater endpoint
          # (`releases/latest/download/latest.json`) skips prereleases, and the
          # alpha channel is currently the only channel (ADR 0014 D4).
          prerelease: false
