name: Release

# Builds the signed NSIS installer + updater artifacts whenever a version tag
# is pushed, and attaches them to a draft GitHub Release (ADR 0014 D5).
# Requires the TAURI_SIGNING_PRIVATE_KEY repository secret (updater signing).

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Windows installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust (toolchain pinned via rust-toolchain.toml)
        run: rustup show

      - name: Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: npm ci
        run: npm ci
        working-directory: frontend

      # Pinned to a commit SHA: this job handles the updater signing key, so a
      # mutable action tag must not be able to change the code that sees it.
      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SkyComet ${{ github.ref_name }}'
          releaseBody: 'See [CHANGELOG.md](https://github.com/oguzkabaca/SkyComet/blob/main/CHANGELOG.md) for details.'
          releaseDraft: true
          # Not flagged as a GitHub prerelease: the updater endpoint
          # (`releases/latest/download/latest.json`) skips prereleases, and the
          # alpha channel is currently the only channel (ADR 0014 D4).
          prerelease: false
