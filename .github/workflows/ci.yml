name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (toolchain pinned via rust-toolchain.toml)
        run: rustup show

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --no-fail-fast

      - name: cargo build (debug)
        run: cargo build

  frontend:
    name: Frontend (typecheck, lint, build)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: tsc typecheck
        run: npx tsc --noEmit

      - name: eslint
        run: npm run lint

      - name: vite build
        run: npm run build
