name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI only reads the repository; release.yml requests write access explicitly.
permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust (toolchain pinned via rust-toolchain.toml)
        run: rustup show

      - name: Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --no-fail-fast

      - name: cargo build (debug)
        run: cargo build

  frontend:
    name: Frontend (typecheck, lint, build)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: tsc typecheck
        run: npx tsc --noEmit

      - name: eslint
        run: npm run lint

      - name: vite build
        run: npm run build
